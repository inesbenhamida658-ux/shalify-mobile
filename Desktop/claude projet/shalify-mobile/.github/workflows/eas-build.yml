name: Build appli Shalify (EAS)

# Se déclenche manuellement (bouton "Run workflow" sur GitHub)
# ou à chaque push sur main qui touche l'appli mobile.
on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'shalify-mobile/**'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    defaults:
      run:
        working-directory: shalify-mobile
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installer EAS CLI
        run: npm install -g eas-cli

      - name: Installer les dépendances
        run: npm install --no-audit --no-fund

      - name: Vérifier le code (typecheck)
        run: node node_modules/typescript/bin/tsc --noEmit --project tsconfig.check.json

      # Pour activer les builds automatiques, ajoute un secret EXPO_TOKEN
      # dans GitHub (Settings > Secrets > Actions). Token créé sur expo.dev.
      - name: Build iOS (cloud)
        if: ${{ env.EXPO_TOKEN != '' }}
        run: eas build --platform ios --profile preview --non-interactive

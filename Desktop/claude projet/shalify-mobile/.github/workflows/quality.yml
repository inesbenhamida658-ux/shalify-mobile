name: Qualité & parité appli↔site

# Système automatique : à chaque changement (push/PR) ET chaque nuit,
# on vérifie les types + la cohérence de l'appli avec la charte du site.
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 3 * * *' # chaque nuit 03:00 UTC
  workflow_dispatch: {}

jobs:
  qualite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Installer les dépendances
        run: npm ci || npm install

      - name: Contrôle des types (tsc)
        run: npm run typecheck

      - name: Parité appli ↔ site (palette, i18n, accents)
        run: node scripts/verify-parity.mjs
